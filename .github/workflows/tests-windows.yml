name: Windows Tests

# Fires after Windows Build completes; runs only when the build succeeded.
# Re-builds the debug preset locally so it has the test binaries (sccache
# restores the populated cache from the build run, so it's an incremental
# link rather than a full compile).
on:
  workflow_run:
    workflows: ["Windows Build"]
    types: [completed]

concurrency:
  group: tests-windows-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  test:
    name: Build + Tests
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: .sccache
          key: sccache-windows-debug-${{ github.event.workflow_run.head_sha }}
          restore-keys: |
            sccache-windows-debug-

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-windows-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            nuget-windows-

      - name: Cache FetchContent _deps
        uses: actions/cache@v4
        with:
          path: build/debug/_deps
          key: deps-windows-debug-${{ hashFiles('cmake/Dependencies.cmake') }}
          restore-keys: |
            deps-windows-debug-

      - name: Restore .NET packages
        shell: bash
        run: |
          shopt -s globstar nullglob
          for proj in src/**/*.csproj tests/**/*.csproj samples/**/*.csproj; do
            dotnet restore "$proj"
          done

      - name: Configure
        env:
          SCCACHE_DIR: ${{ github.workspace }}/.sccache
        run: >
          cmake --preset debug
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        env:
          SCCACHE_DIR: ${{ github.workspace }}/.sccache
        run: cmake --build build/debug --config Debug

      - name: sccache stats
        env:
          SCCACHE_DIR: ${{ github.workspace }}/.sccache
        run: sccache --show-stats

      - name: Unit Tests
        working-directory: build/debug
        run: ctest --build-config Debug --label-regex unit --output-on-failure

      - name: Integration Tests
        working-directory: build/debug
        run: ctest --build-config Debug --label-regex integration --output-on-failure

      - name: C# IntegrationTests
        env:
          ATLAS_BIN_DIR: ${{ github.workspace }}/bin/debug
        run: dotnet test tests/csharp/Atlas.Client.IntegrationTests --filter "Category!=Nightly" --nologo

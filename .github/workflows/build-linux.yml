name: Linux Build

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'tools/profile/**'
      - 'tools/cluster_control/**'
      - '.gitignore'
      - 'memory/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'tools/profile/**'
      - 'tools/cluster_control/**'
      - '.gitignore'
      - 'memory/**'

concurrency:
  group: build-linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.preset }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: debug
            config: Debug
          - preset: profile
            config: RelWithDebInfo
          - preset: release
            config: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install GCC 13 + Ninja
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-13 ninja-build
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: .sccache
          key: sccache-linux-${{ matrix.preset }}-${{ github.sha }}
          restore-keys: |
            sccache-linux-${{ matrix.preset }}-

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-linux-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            nuget-linux-

      - name: Cache FetchContent _deps
        uses: actions/cache@v4
        with:
          path: build/${{ matrix.preset }}/_deps
          key: deps-linux-${{ matrix.preset }}-${{ hashFiles('cmake/Dependencies.cmake') }}
          restore-keys: |
            deps-linux-${{ matrix.preset }}-

      - name: Restore .NET packages
        shell: bash
        run: |
          shopt -s globstar nullglob
          for proj in src/**/*.csproj tests/**/*.csproj samples/**/*.csproj; do
            dotnet restore "$proj"
          done

      - name: Configure
        env:
          SCCACHE_DIR: ${{ github.workspace }}/.sccache
        run: >
          cmake --preset ${{ matrix.preset }}
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
          -DATLAS_BUILD_TESTS=OFF

      - name: Build
        env:
          SCCACHE_DIR: ${{ github.workspace }}/.sccache
        run: cmake --build build/${{ matrix.preset }} --config ${{ matrix.config }}

      - name: sccache stats
        env:
          SCCACHE_DIR: ${{ github.workspace }}/.sccache
        run: sccache --show-stats

name: Clang Format

on:
  push:
    branches: [main]
    paths:
      - '**/*.cc'
      - '**/*.cpp'
      - '**/*.h'
      - '**/*.hpp'
      - '.clang-format'
      - '.github/workflows/clang-format.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.cc'
      - '**/*.cpp'
      - '**/*.h'
      - '**/*.hpp'
      - '.clang-format'
      - '.github/workflows/clang-format.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-check:
    name: Check Code Format
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format 19.1.5 via pip
        run: pip install clang-format==19.1.5

      - name: Run clang-format check
        run: |
          find src tests \( -name '*.cc' -o -name '*.cpp' -o -name '*.h' -o -name '*.hpp' \) -print0 \
            | xargs -0 clang-format --dry-run --Werror

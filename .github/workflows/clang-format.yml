name: Clang Format

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format-check:
    name: Check Code Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format 19.1.5 via pip
        run: pip install clang-format==19.1.5

      - name: Run clang-format check
        run: |
          find src tests -name '*.cc' -o -name '*.cpp' -o -name '*.h' -o -name '*.hpp' | \
            xargs clang-format --dry-run --Werror

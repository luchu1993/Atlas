name: CMake CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows (MSVC, Debug)
            os: windows-latest
            preset: debug
            config: Debug
            run_tests: true

          - name: Windows (MSVC, Release)
            os: windows-latest
            preset: release
            config: Release
            run_tests: false

          - name: Linux (GCC, Debug)
            os: ubuntu-latest
            preset: debug
            config: Debug
            run_tests: true

          - name: Linux (GCC, Release)
            os: ubuntu-latest
            preset: release
            config: Release
            run_tests: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install GCC 13 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-13
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build build/${{ matrix.preset }} --config ${{ matrix.config }}

      - name: Unit Tests
        if: matrix.run_tests
        working-directory: build/${{ matrix.preset }}
        run: ctest --build-config ${{ matrix.config }} --label-regex unit --output-on-failure

      - name: Integration Tests
        if: matrix.run_tests
        working-directory: build/${{ matrix.preset }}
        run: ctest --build-config ${{ matrix.config }} --label-regex integration --output-on-failure

name: CMake CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'tools/profile/**'
      - 'tools/cluster_control/**'
      - '.gitignore'
      - 'memory/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'tools/profile/**'
      - 'tools/cluster_control/**'
      - '.gitignore'
      - 'memory/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows (MSVC, Debug)
            os: windows-2022
            preset: debug
            config: Debug
            run_tests: true

          - name: Windows (MSVC, Release)
            os: windows-2022
            preset: release
            config: Release
            run_tests: false

          - name: Linux (GCC, Debug)
            os: ubuntu-24.04
            preset: debug
            config: Debug
            run_tests: true

          - name: Linux (GCC, Release)
            os: ubuntu-24.04
            preset: release
            config: Release
            run_tests: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install GCC 13 + Ninja (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-13 ninja-build
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: .sccache
          key: sccache-${{ runner.os }}-${{ matrix.preset }}-${{ github.sha }}
          restore-keys: |
            sccache-${{ runner.os }}-${{ matrix.preset }}-

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Cache FetchContent _deps
        uses: actions/cache@v4
        with:
          path: build/${{ matrix.preset }}/_deps
          key: deps-${{ runner.os }}-${{ matrix.preset }}-${{ hashFiles('cmake/Dependencies.cmake') }}
          restore-keys: |
            deps-${{ runner.os }}-${{ matrix.preset }}-

      - name: Restore .NET packages
        shell: bash
        run: |
          shopt -s globstar nullglob
          for proj in src/**/*.csproj tests/**/*.csproj samples/**/*.csproj; do
            dotnet restore "$proj"
          done

      - name: Configure
        env:
          SCCACHE_DIR: ${{ github.workspace }}/.sccache
        run: >
          cmake --preset ${{ matrix.preset }}
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        env:
          SCCACHE_DIR: ${{ github.workspace }}/.sccache
        run: cmake --build build/${{ matrix.preset }} --config ${{ matrix.config }}

      - name: sccache stats
        env:
          SCCACHE_DIR: ${{ github.workspace }}/.sccache
        run: sccache --show-stats

      - name: Unit Tests
        if: matrix.run_tests
        working-directory: build/${{ matrix.preset }}
        run: ctest --build-config ${{ matrix.config }} --label-regex unit --output-on-failure

      - name: Integration Tests
        if: matrix.run_tests
        working-directory: build/${{ matrix.preset }}
        run: ctest --build-config ${{ matrix.config }} --label-regex integration --output-on-failure

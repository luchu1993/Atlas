name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows (MSVC)
            os: windows-latest
            configure-preset: debug-windows
            build-preset: debug-windows
            test-preset: debug-windows

          - name: Linux (GCC)
            os: ubuntu-latest
            configure-preset: debug-linux
            build-preset: debug-ninja
            test-preset: debug-ninja

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y ninja-build

      - name: Install GCC 13 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake --preset ${{ matrix.configure-preset }}

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: cmake --preset debug-ninja

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build --preset ${{ matrix.build-preset }}

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cmake --build --preset debug-ninja

      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: ctest --preset ${{ matrix.test-preset }}

      - name: Test (Linux)
        if: runner.os == 'Linux'
        run: ctest --preset debug-ninja

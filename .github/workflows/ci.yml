name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows (MSVC + Ninja, Debug)
            os: windows-latest
            build_preset: debug-ninja
            test_preset: debug-ninja
            run_tests: true

          - name: Windows (MSVC + Ninja, Release)
            os: windows-latest
            build_preset: release-ninja
            run_tests: false

          - name: Linux (GCC 13 + Ninja, Debug)
            os: ubuntu-latest
            build_preset: debug-ninja
            test_preset: debug-ninja
            run_tests: true

          - name: Linux (GCC 13 + Ninja, Release)
            os: ubuntu-latest
            build_preset: release-ninja
            run_tests: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build gcc-13 g++-13
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100

      - name: Configure
        run: cmake --preset ${{ matrix.build_preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.build_preset }}

      - name: Unit Tests
        if: matrix.run_tests
        run: ctest --preset ${{ matrix.test_preset }} -L unit

      - name: Integration Tests
        if: matrix.run_tests
        run: ctest --preset ${{ matrix.test_preset }} -L integration

name: Sanitizers

# Sanitizers (asan / ubsan) are slow and disk-heavy, so they don't gate PRs.
# Run weekly and on demand. tsan is excluded — TSan + custom allocator paths
# in atlas::HeapAlloc produce noisy false positives that need a dedicated pass.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0'   # Sunday 03:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sanitize:
    name: ${{ matrix.preset }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        preset: [asan, ubsan]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install GCC 13 + Ninja
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-13 ninja-build
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: .sccache
          key: sccache-linux-${{ matrix.preset }}-${{ github.sha }}
          restore-keys: |
            sccache-linux-${{ matrix.preset }}-

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Cache FetchContent _deps
        uses: actions/cache@v4
        with:
          path: build/${{ matrix.preset }}/_deps
          key: deps-${{ runner.os }}-${{ matrix.preset }}-${{ hashFiles('cmake/Dependencies.cmake') }}
          restore-keys: |
            deps-${{ runner.os }}-${{ matrix.preset }}-

      - name: Restore .NET packages
        shell: bash
        run: |
          shopt -s globstar nullglob
          for proj in src/**/*.csproj tests/**/*.csproj samples/**/*.csproj; do
            dotnet restore "$proj"
          done

      - name: Configure
        env:
          SCCACHE_DIR: ${{ github.workspace }}/.sccache
          CMAKE_GENERATOR: Ninja
        run: >
          cmake --preset ${{ matrix.preset }}
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        env:
          SCCACHE_DIR: ${{ github.workspace }}/.sccache
        run: cmake --build build/${{ matrix.preset }} --config Debug

      - name: sccache stats
        env:
          SCCACHE_DIR: ${{ github.workspace }}/.sccache
        run: sccache --show-stats

      - name: Unit Tests
        working-directory: build/${{ matrix.preset }}
        env:
          # Atlas's pool allocator legitimately leaks at static-init shutdown;
          # the asan preset doesn't switch to std heap on Linux (only asan-msvc
          # does), so leak detection would dominate noise. Keep heap-use-
          # after-free etc., drop leaks.
          ASAN_OPTIONS: detect_leaks=0:halt_on_error=1:abort_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1:abort_on_error=1
        run: ctest --build-config Debug --label-regex unit --output-on-failure

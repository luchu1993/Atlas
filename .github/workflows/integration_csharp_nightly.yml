name: C# Integration (Nightly)

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  real-cluster:
    name: Real cluster (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, ubuntu-24.04]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-13 ninja-build
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100

      - name: Configure
        run: cmake --preset debug

      - name: Build
        run: cmake --build build/debug --config Debug

      - name: Run nightly real-cluster tests
        env:
          ATLAS_BIN_DIR: ${{ github.workspace }}/bin/debug
        run: dotnet test tests/csharp/Atlas.Client.IntegrationTests --filter "Category=Nightly" --nologo --logger "console;verbosity=detailed"

      - name: Kill leftover processes (Windows)
        if: always() && runner.os == 'Windows'
        run: |
          taskkill /F /IM machined.exe 2>$null
          taskkill /F /IM atlas_loginapp.exe 2>$null
          taskkill /F /IM atlas_baseapp.exe 2>$null
          taskkill /F /IM atlas_baseappmgr.exe 2>$null
          taskkill /F /IM atlas_dbapp.exe 2>$null
          exit 0
        shell: pwsh

      - name: Kill leftover processes (Linux)
        if: always() && runner.os == 'Linux'
        run: |
          pkill -f machined || true
          pkill -f atlas_loginapp || true
          pkill -f atlas_baseapp || true
          pkill -f atlas_baseappmgr || true
          pkill -f atlas_dbapp || true
